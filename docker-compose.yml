services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dondone}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      TZ: Asia/Seoul
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?POSTGRES_USER is required} -d ${POSTGRES_DB:-dondone}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 512m
    networks:
      - dondone-network

  redis:
    image: redis:7.4.8
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 256m
    networks:
      - dondone-network

  api-server:
    build:
      context: ./apps/dondone-backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-dondone}
      DB_USERNAME: ${POSTGRES_USER:?POSTGRES_USER is required}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_EXPIRATION_MS: ${JWT_ACCESS_EXPIRATION_MS:-86400000}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-demo}
      REMITTANCE_CHAIN_MODE: ${REMITTANCE_CHAIN_MODE}
      REMITTANCE_CHAIN_RPC_URL: ${REMITTANCE_CHAIN_RPC_URL}
      REMITTANCE_CHAIN_ID: ${REMITTANCE_CHAIN_ID}
      REMITTANCE_TOKEN_ADDRESS: ${REMITTANCE_TOKEN_ADDRESS}
      REMITTANCE_TREASURY_PRIVATE_KEY: ${REMITTANCE_TREASURY_PRIVATE_KEY}
      REMITTANCE_WALLET_ENCRYPTION_KEY: ${REMITTANCE_WALLET_ENCRYPTION_KEY}
      REMITTANCE_HIGH_AMOUNT_THRESHOLD_ATOMIC: ${REMITTANCE_HIGH_AMOUNT_THRESHOLD_ATOMIC}
      REMITTANCE_INITIAL_TOKEN_AMOUNT_ATOMIC: ${REMITTANCE_INITIAL_TOKEN_AMOUNT_ATOMIC}
      JAVA_OPTS: "-Xms256m -Xmx512m"
      TZ: Asia/Seoul
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 1280m
    networks:
      - dondone-network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      api-server:
        condition: service_started
    mem_limit: 128m
    networks:
      - dondone-network

  jenkins:
    image: jenkins/jenkins:lts-jdk21
    restart: always
    user: root
    expose:
      - "8080"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
      - /usr/libexec/docker/cli-plugins:/usr/libexec/docker/cli-plugins
      - /srv/dondone/app:/srv/dondone/app
    environment:
      TZ: Asia/Seoul
      JAVA_OPTS: "-Xms512m -Xmx1024m -Duser.timezone=Asia/Seoul"
      JENKINS_OPTS: "--prefix=/jenkins"
    mem_limit: 4g
    networks:
      - dondone-network


volumes:
  postgres_data:
  redis_data:
  jenkins_data:

networks:
  dondone-network:
    driver: bridge
