x-runtime-service: &runtime-service
  restart: always
  networks:
    - dondone-network

services:
  postgres:
    <<: *runtime-service
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      TZ: Asia/Seoul
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?POSTGRES_USER is required} -d ${POSTGRES_DB:?POSTGRES_DB is required}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 512m

  redis:
    <<: *runtime-service
    image: redis:7.4.8
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 256m

  api-server:
    <<: *runtime-service
    build:
      context: ./apps/dondone-backend
      dockerfile: Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      DB_USERNAME: ${POSTGRES_USER:?POSTGRES_USER is required}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_EXPIRATION_MS: ${JWT_ACCESS_EXPIRATION_MS:-86400000}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:?SPRING_PROFILES_ACTIVE is required}
      EMPLOYER_SIGNUP_CODE_ENCRYPTION_KEY: ${EMPLOYER_SIGNUP_CODE_ENCRYPTION_KEY:-}
      REMITTANCE_CHAIN_MODE: ${REMITTANCE_CHAIN_MODE:?REMITTANCE_CHAIN_MODE is required}
      REMITTANCE_CHAIN_RPC_URL: ${REMITTANCE_CHAIN_RPC_URL:-}
      REMITTANCE_CHAIN_ID: ${REMITTANCE_CHAIN_ID:-11155111}
      REMITTANCE_TOKEN_ADDRESS: ${REMITTANCE_TOKEN_ADDRESS:-}
      REMITTANCE_TREASURY_PRIVATE_KEY: ${REMITTANCE_TREASURY_PRIVATE_KEY:-}
      REMITTANCE_WALLET_ENCRYPTION_KEY: ${REMITTANCE_WALLET_ENCRYPTION_KEY:-}
      REMITTANCE_WALLET_FUNDING_RECEIPT_TIMEOUT_SECONDS: ${REMITTANCE_WALLET_FUNDING_RECEIPT_TIMEOUT_SECONDS:-60}
      REMITTANCE_WALLET_FUNDING_PENDING_STALE_SECONDS: ${REMITTANCE_WALLET_FUNDING_PENDING_STALE_SECONDS:-300}
      REMITTANCE_ASSET_SYMBOL: ${REMITTANCE_ASSET_SYMBOL:-dUSDC}
      REMITTANCE_ASSET_DECIMALS: ${REMITTANCE_ASSET_DECIMALS:-6}
      REMITTANCE_HIGH_AMOUNT_THRESHOLD_ATOMIC: ${REMITTANCE_HIGH_AMOUNT_THRESHOLD_ATOMIC:-100000000}
      REMITTANCE_RECENT_RECIPIENT_WINDOW_SECONDS: ${REMITTANCE_RECENT_RECIPIENT_WINDOW_SECONDS:-86400}
      REMITTANCE_MAX_AUTO_RETRY_COUNT: ${REMITTANCE_MAX_AUTO_RETRY_COUNT:-2}
      REMITTANCE_DEFAULT_LIST_LIMIT: ${REMITTANCE_DEFAULT_LIST_LIMIT:-20}
      REMITTANCE_WORKER_POLL_INTERVAL_MS: ${REMITTANCE_WORKER_POLL_INTERVAL_MS:-2000}
      REMITTANCE_RECEIPT_POLL_DELAY_SECONDS: ${REMITTANCE_RECEIPT_POLL_DELAY_SECONDS:-2}
      REMITTANCE_RECEIPT_TIMEOUT_SECONDS: ${REMITTANCE_RECEIPT_TIMEOUT_SECONDS:-300}
      REMITTANCE_TOKEN_GAS_LIMIT: ${REMITTANCE_TOKEN_GAS_LIMIT:-120000}
      REMITTANCE_NATIVE_TRANSFER_GAS_LIMIT: ${REMITTANCE_NATIVE_TRANSFER_GAS_LIMIT:-21000}
      REMITTANCE_INITIAL_TOKEN_AMOUNT_ATOMIC: ${REMITTANCE_INITIAL_TOKEN_AMOUNT_ATOMIC:-500000000}
      REMITTANCE_INITIAL_NATIVE_AMOUNT_WEI: ${REMITTANCE_INITIAL_NATIVE_AMOUNT_WEI:-10000000000000000}
      TZ: Asia/Seoul
      JAVA_OPTS: "-Xms256m -Xmx512m"
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    mem_limit: 1280m

  web:
    <<: *runtime-service
    build:
      context: ./apps/dondone-web
      dockerfile: Dockerfile
      args:
        VITE_KAKAO_MAP_APP_KEY: ${VITE_KAKAO_MAP_APP_KEY:-}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    mem_limit: 256m

  nginx:
    <<: *runtime-service
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      api-server:
        condition: service_started
      web:
        condition: service_started
      jenkins:
        condition: service_started
    mem_limit: 128m

  jenkins:
    <<: *runtime-service
    image: jenkins/jenkins:lts-jdk21
    user: root
    expose:
      - "8080"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
      - /usr/libexec/docker/cli-plugins:/usr/libexec/docker/cli-plugins
      - /srv/dondone/app:/srv/dondone/app
    environment:
      TZ: Asia/Seoul
      JAVA_OPTS: "-Xms512m -Xmx1024m -Duser.timezone=Asia/Seoul"
      JENKINS_OPTS: "--prefix=/jenkins"
    mem_limit: 4g

volumes:
  postgres_data:
  redis_data:
  jenkins_data:

networks:
  dondone-network:
    driver: bridge
