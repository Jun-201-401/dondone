spring:
  application:
    name: dawndone-backend
  datasource:
    url: ${DB_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dawndone}}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:${SPRING_DATASOURCE_USERNAME:dawndone}}
    password: ${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:dawndone}}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:dawndone-local-secret-key-change-this-at-least-32chars}
  access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:86400000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
