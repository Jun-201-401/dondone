<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Edge Network - Ultra Visibility</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at 75% 50%, #e2e8f0 0%, #f1f5f9 100%);
            font-family: 'Inter', sans-serif;
            color: #1e293b;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 1;
        }

        .content-overlay {
            position: relative;
            z-index: 10;
            pointer-events: none;
            height: 100vh;
            display: flex;
            align-items: center;
        }

        .gradient-text {
            background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .city-label {
            position: absolute;
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 8px;
            font-size: 12px;
            font-weight: 800;
            color: #1d4ed8;
            pointer-events: none;
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.2);
            border: 1.5px solid #2563eb;
            z-index: 20;
            transition: opacity 0.2s;
        }
    </style>
</head>

<body>

    <div id="canvas-container"></div>

    <!-- UI Overlay -->
    <div class="content-overlay px-12 md:px-24">
        <div class="max-w-xl">
            <div class="mb-8 flex items-center gap-3" id="badge">
                <span class="relative flex h-4 w-4">
                    <span
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-600 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-4 w-4 bg-blue-700"></span>
                </span>
                <span class="text-blue-800 text-sm font-black uppercase tracking-widest">Premium Edge Network</span>
            </div>

            <h1 class="text-6xl md:text-8xl font-black tracking-tight mb-6 leading-none text-slate-900">
                Ultra<br />
                <span class="gradient-text">Connected</span>
            </h1>

            <p class="text-slate-700 text-lg mb-12 leading-relaxed max-w-md font-semibold">
                더욱 선명해진 네트워크 연결망을 확인하세요.
                전 세계 엣지 노드 간의 실시간 데이터 흐름이 눈앞에 펼쳐집니다.
            </p>

            <div class="grid grid-cols-3 gap-8 pt-8 border-t-2 border-slate-300">
                <div>
                    <div class="text-3xl font-black text-slate-900">150+</div>
                    <div class="text-slate-600 text-xs mt-1 font-bold uppercase tracking-wider">Nodes</div>
                </div>
                <div>
                    <div class="text-3xl font-black text-slate-900">P99</div>
                    <div class="text-slate-600 text-xs mt-1 font-bold uppercase tracking-wider">Reliable</div>
                </div>
                <div>
                    <div class="text-3xl font-black text-slate-900">99.99%</div>
                    <div class="text-slate-600 text-xs mt-1 font-bold uppercase tracking-wider">Uptime</div>
                </div>
            </div>
        </div>
    </div>

    <div id="labels-container" class="absolute inset-0 pointer-events-none z-20"></div>

    <script>
        let scene, camera, renderer, globeGroup;
        let points, particles = [];
        const container = document.getElementById('canvas-container');
        const labelsContainer = document.getElementById('labels-container');

        const GLOBE_RADIUS = 90;
        const DOT_COUNT = 9000;

        const cities = [
            { name: "San Francisco", lat: 37.77, lon: -122.41 },
            { name: "New York", lat: 40.71, lon: -74.00 },
            { name: "London", lat: 51.50, lon: -0.12 },
            { name: "Tokyo", lat: 35.67, lon: 139.65 },
            { name: "Seoul", lat: 37.56, lon: 126.97 },
            { name: "Singapore", lat: 1.35, lon: 103.81 },
            { name: "Sydney", lat: -33.86, lon: 151.20 },
            { name: "Sao Paulo", lat: -23.55, lon: -46.63 }
        ];

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 1, 2000);
            camera.position.z = 350;
            camera.position.x = 60;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            globeGroup = new THREE.Group();
            scene.add(globeGroup);

            // 1. 지구 베이스 구체 (가시성 확보용)
            const baseGeo = new THREE.SphereGeometry(GLOBE_RADIUS - 0.5, 64, 64);
            const baseMat = new THREE.MeshPhongMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.25,
                shininess: 80
            });
            const baseMesh = new THREE.Mesh(baseGeo, baseMat);
            globeGroup.add(baseMesh);

            // 2. 조명
            const light = new THREE.DirectionalLight(0xffffff, 1.2);
            light.position.set(5, 5, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));

            // 3. 육지 포인트 생성
            createLandmassPoints();

            // 4. 도시 노드
            addCities();

            // 5. 네트워크 (굵은 선 시각화 개선)
            createNetwork();

            setupInteractions();
            animate();
        }

        function latLonToVector3(lat, lon, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            const x = -(radius * Math.sin(phi) * Math.cos(theta));
            const y = radius * Math.cos(phi);
            const z = radius * Math.sin(phi) * Math.sin(theta);
            return new THREE.Vector3(x, y, z);
        }

        function createLandmassPoints() {
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.src = "https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_specular_2048.jpg";

            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 1024;
                canvas.height = 512;
                ctx.drawImage(img, 0, 0, 1024, 512);
                const data = ctx.getImageData(0, 0, 1024, 512).data;

                const positions = [];
                for (let i = 0; i < DOT_COUNT; i++) {
                    const phi = Math.acos(-1 + (2 * i) / DOT_COUNT);
                    const theta = Math.sqrt(DOT_COUNT * Math.PI) * phi;
                    const u = (theta % (2 * Math.PI)) / (2 * Math.PI);
                    const v = phi / Math.PI;
                    const pixelIdx = (Math.floor(v * 512) * 1024 + Math.floor(u * 1024)) * 4;

                    if (data[pixelIdx] > 40) {
                        const x = GLOBE_RADIUS * Math.cos(theta) * Math.sin(phi);
                        const y = GLOBE_RADIUS * Math.cos(phi);
                        const z = GLOBE_RADIUS * Math.sin(theta) * Math.sin(phi);
                        positions.push(x, y, z);
                    }
                }

                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
                const material = new THREE.PointsMaterial({
                    size: 1.3,
                    color: 0x2563eb,
                    transparent: true,
                    opacity: 0.85
                });
                points = new THREE.Points(geometry, material);
                globeGroup.add(points);
            };
        }

        function addCities() {
            cities.forEach(city => {
                const pos = latLonToVector3(city.lat, city.lon, GLOBE_RADIUS);
                const dot = new THREE.Mesh(
                    new THREE.SphereGeometry(1.8, 16, 16),
                    new THREE.MeshBasicMaterial({ color: 0x1d4ed8 })
                );
                dot.position.copy(pos);
                globeGroup.add(dot);
                city.mesh = dot;

                const el = document.createElement('div');
                el.className = 'city-label';
                el.textContent = city.name;
                labelsContainer.appendChild(el);
                city.element = el;
            });
        }

        function createNetwork() {
            // 선의 가시성을 위해 더 진한 파란색과 높은 불투명도 적용
            const lineMat = new THREE.LineBasicMaterial({
                color: 0x2563eb,
                transparent: true,
                opacity: 0.6, // 0.3에서 0.6으로 상향
                blending: THREE.NormalBlending
            });

            for (let i = 0; i < cities.length; i++) {
                const startCity = cities[i];
                // 연결성 강화를 위해 타겟 노드 증가
                const targets = [
                    cities[(i + 1) % cities.length],
                    cities[(i + 2) % cities.length],
                    cities[(i + 4) % cities.length]
                ];

                targets.forEach(targetCity => {
                    const start = latLonToVector3(startCity.lat, startCity.lon, GLOBE_RADIUS);
                    const end = latLonToVector3(targetCity.lat, targetCity.lon, GLOBE_RADIUS);
                    // 곡선 높이를 다양하게 하여 입체감 부여
                    const arcHeight = 1.2 + Math.random() * 0.3;
                    const mid = start.clone().lerp(end, 0.5).normalize().multiplyScalar(GLOBE_RADIUS * arcHeight);

                    const curve = new THREE.QuadraticBezierCurve3(start, mid, end);
                    const lineGeo = new THREE.BufferGeometry().setFromPoints(curve.getPoints(50));
                    const line = new THREE.Line(lineGeo, lineMat);
                    globeGroup.add(line);

                    // 입자 시각화 대폭 강화 (크기 및 밝기)
                    const pGeo = new THREE.SphereGeometry(1.0, 12, 12);
                    const pMat = new THREE.MeshBasicMaterial({
                        color: 0x60a5fa,
                        transparent: true,
                        opacity: 0.9
                    });
                    const p = new THREE.Mesh(pGeo, pMat);
                    scene.add(p);
                    particles.push({
                        mesh: p,
                        curve,
                        progress: Math.random(),
                        speed: 0.002 + Math.random() * 0.004
                    });
                });
            }
        }

        function setupInteractions() {
            let isDragging = false;
            let prevMouse = { x: 0, y: 0 };
            let targetRot = { x: 0, y: 0 };
            let currentRot = { x: 0, y: 0 };

            const updatePos = (e) => {
                const x = e.touches ? e.touches[0].clientX : e.clientX;
                const y = e.touches ? e.touches[0].clientY : e.clientY;
                if (isDragging) {
                    targetRot.y += (x - prevMouse.x) * 0.005;
                    targetRot.x += (y - prevMouse.y) * 0.005;
                }
                prevMouse = { x, y };
            };

            container.onmousedown = () => isDragging = true;
            window.onmouseup = () => isDragging = false;
            window.onmousemove = updatePos;
            container.ontouchstart = () => isDragging = true;
            window.ontouchend = () => isDragging = false;
            window.ontouchmove = updatePos;

            window.handleRotation = () => {
                currentRot.x += (targetRot.x - currentRot.x) * 0.08;
                currentRot.y += (targetRot.y - currentRot.y) * 0.08;
                globeGroup.rotation.x = currentRot.x;
                globeGroup.rotation.y = currentRot.y + (Date.now() * 0.00018); // 회전 속도 약간 증가
            };
        }

        function animate() {
            requestAnimationFrame(animate);
            if (window.handleRotation) window.handleRotation();

            particles.forEach(p => {
                p.progress += p.speed;
                if (p.progress > 1) p.progress = 0;
                const pos = p.curve.getPointAt(p.progress);
                p.mesh.position.copy(pos).applyMatrix4(globeGroup.matrixWorld);
            });

            cities.forEach(city => {
                const vector = city.mesh.position.clone().applyMatrix4(globeGroup.matrixWorld);
                const isBehind = vector.dot(camera.position.clone().normalize()) < 0;

                if (isBehind) {
                    city.element.style.opacity = '0';
                    city.element.style.pointerEvents = 'none';
                } else {
                    vector.project(camera);
                    city.element.style.opacity = '1';
                    city.element.style.pointerEvents = 'auto';
                    city.element.style.left = `${(vector.x * 0.5 + 0.5) * window.innerWidth}px`;
                    city.element.style.top = `${(-(vector.y * 0.5) + 0.5) * window.innerHeight}px`;
                }
            });

            renderer.render(scene, camera);
        }

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };

        init();
    </script>
</body>

</html>
