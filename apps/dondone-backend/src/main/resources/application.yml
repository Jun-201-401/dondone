spring:
  application:
    name: dondone-backend
  datasource:
    url: ${DB_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:dondone}}}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:${SPRING_DATASOURCE_USERNAME:dondone}}
    password: ${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:dondone}}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:dondone-local-secret-key-change-this-at-least-32chars}
  access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:86400000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
