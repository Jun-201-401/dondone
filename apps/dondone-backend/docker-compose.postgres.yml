version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: dondone-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dondone
      POSTGRES_USER: dondone
      POSTGRES_PASSWORD: dondone
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dondone -d dondone"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
