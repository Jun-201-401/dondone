server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/dondone?currentSchema=test
    driver-class-name: org.postgresql.Driver
    username: ssafy
    password: ssafy
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        default_schema: test
  sql:
    init:
      mode: always

app:
  chain:
    mode: demo
    rpc-url: ${SEPOLIA_RPC_URL:}
    chain-id: ${SEPOLIA_CHAIN_ID:11155111}
    token-address: ${SEPOLIA_TOKEN_ADDRESS:}
    stablecoin-symbol: ${SEPOLIA_STABLECOIN_SYMBOL:dUSDC}
    gas-limit: ${SEPOLIA_GAS_LIMIT:120000}
    onboarding:
      enabled: ${SEPOLIA_ONBOARDING_ENABLED:true}
      funding-private-key: ${SEPOLIA_FUNDING_PRIVATE_KEY:${PRIVATE_KEY:}}
      eth-amount-wei: ${SEPOLIA_ONBOARDING_ETH_AMOUNT_WEI:10000000000000000}
      stablecoin-amount-atomic: ${SEPOLIA_ONBOARDING_STABLECOIN_AMOUNT_ATOMIC:200000000}
  wallet:
    encryption-key: ${WALLET_ENCRYPTION_KEY:}
    allow-generated-key: false
  remittance:
    high-amount-threshold: 100000
    cooldown-seconds: 86400
    receipt-link-ttl-seconds: 900
  worker:
    poll-interval-ms: 2000
    receipt-confirm-delay-seconds: 5
